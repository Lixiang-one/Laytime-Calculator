<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>iOS Safari 点击测试</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0A0814;
      color: white;
      min-height: 100vh;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
    }
    .card {
      background: #1a1822;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    button {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border-radius: 16px;
      border: none;
      background: #7e22ff;
      color: white;
      margin-top: 12px;
      font-weight: bold;
    }
    .test-btn {
      padding: 16px 24px;
      font-size: 17px;
      border-radius: 9999px;
      background: #1a1822;
      border: 2px solid #ffffff20;
      margin: 8px;
    }
  </style>
</head>
<body>

  <h1 style="text-align:center; margin-bottom:30px; font-size:24px;">🔬 iOS Safari 纯 HTML 测试页</h1>

  <div class="card">
    <p style="margin-bottom:12px; color:#aaa;">1. 方向切换（测试）</p>
    <div style="display:flex; background:#11101a; border-radius:9999px; padding:4px;">
      <button onclick="alert('✅ 垂直按钮点击成功！')" class="test-btn" style="flex:1;">⬇️ 上下垂直</button>
      <button onclick="alert('✅ 水平按钮点击成功！')" class="test-btn" style="flex:1;">➡️ 左右水平</button>
    </div>
  </div>

  <div class="card">
    <p style="margin-bottom:12px; color:#aaa;">2. 其他按钮测试</p>
    <button onclick="alert('✅ 生成拼接图片按钮点击成功！')">生成拼接图片</button>
    <button onclick="alert('✅ 添加图片按钮点击成功！')" style="background:#333; margin-top:12px;">+ 添加图片</button>
    <button onclick="alert('✅ 清除结果按钮点击成功！')" style="background:#333; margin-top:12px;">清除结果</button>
  </div>

  <p style="text-align:center; margin-top:40px; color:#666; font-size:13px;">
    如果你能看到弹窗，说明你的 iPhone Safari 本身是正常的。<br>
    问题出在 Next.js 项目里。<br><br>
    请把测试结果告诉我：
  </p>

</body>
</html>
