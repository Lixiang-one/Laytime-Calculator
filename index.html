<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOF 智能提取 - 卸港版</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; color: #333; }
        .header { border-bottom: 2px solid #0056b3; padding-bottom: 10px; margin-bottom: 20px; }
        .controls { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef; }
        .form-group { margin-bottom: 15px; }
        .radio-group { font-weight: bold; color: #0056b3; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background: #e9ecef; padding: 10px; text-align: left; border: 1px solid #ced4da; }
        td { border: 1px solid #ced4da; padding: 0; }
        input[type="text"] { width: 100%; box-sizing: border-box; border: none; padding: 10px; background: transparent; }
        input[type="text"]:focus { outline: 2px solid #007bff; background: #fff; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold;}
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #copyBtn { background: #28a745; display: none; margin-top: 20px; width: 100%; font-size: 16px; }
        #copyBtn:hover { background: #218838; }
        .badge { display: inline-block; padding: 2px 6px; font-size: 12px; background: #6c757d; color: white; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🚢 SOF Laytime 智能提取助手</h2>
    </div>

    <div class="controls">
        <div class="form-group">
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <div class="radio-group">
            <label><input type="radio" name="portType" value="loading"> 🔵 装港 (Loading)</label>
            <label style="margin-left: 20px;"><input type="radio" name="portType" value="discharging" checked> 🔴 卸港 (Discharging)</label>
        </div>
        
        <div class="form-group" id="rulesContainer">
            <p style="margin: 0 0 10px 0; font-weight: bold;">附加计算规则：</p>
            <label><input type="checkbox" id="ruleShifting" checked> 移泊 (SHIFTING) 计为 0%</label><br>
            <label><input type="checkbox" id="ruleSurvey" checked> 初水尺 (DRAFT SURVEY) 计为 0%</label><br>
            <label><input type="checkbox" id="ruleWeather" checked> 坏天气 (BAD WEATHER) 计为 0%</label><br>
            <label><input type="checkbox" id="ruleTT" checked> 自动推算 12 HOURS TT <span class="badge">JS 硬逻辑</span></label>
        </div>
        
        <button onclick="processImage()" id="submitBtn">🤖 开始提取分析</button>
        <span id="loading" style="display: none; margin-left: 10px; color: #007bff; font-weight: bold;">AI 正在看图，请稍候...</span>
    </div>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th style="width: 8%; display: none;">Date</th> 
                <th style="width: 20%;">FROM (M/D HH:MM)</th>
                <th style="width: 20%;">TO (M/D HH:MM)</th>
                <th style="width: 10%;">RATE</th>
                <th style="width: 12%;">USED</th>
                <th style="width: 30%;">REMARKS</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <button id="copyBtn" onclick="copyToExcel()">📋 确认无误，一键完美复制到 Excel</button>

    <script>
        let laytimeData = [];

        // 【时间工具】：解析 "M/D HH:MM" 为 JavaScript Date 对象
        function parseDateTime(dateTimeStr) {
            if (!dateTimeStr) return null;
            try {
                let parts = dateTimeStr.trim().split(' ');
                if (parts.length !== 2) return null;
                let [month, day] = parts[0].split('/');
                let [hour, minute] = parts[1].split(':');
                // 使用固定年份确保时间差计算不受跨年影响
                return new Date(2024, parseInt(month) - 1, parseInt(day), parseInt(hour), parseInt(minute));
            } catch (e) {
                return null;
            }
        }

        // 【时间工具】：将 Date 对象格式化回 "M/D HH:MM"
        function formatDateTime(dateObj) {
            const m = dateObj.getMonth() + 1;
            const d = dateObj.getDate();
            const hh = String(dateObj.getHours()).padStart(2, '0');
            const mm = String(dateObj.getMinutes()).padStart(2, '0');
            return `${m}/${d} ${hh}:${mm}`;
        }

        // 🔴 核心业务逻辑：拦截、拆分单点、智能缝合、强制切断
                function injectTurnTime(data) {
                    
                    // ================= 第 0 步：预处理 (分离单点，强制切断) =================
                    let cleanData = [];
                    for (let row of data) {
                        if (row.remarks === "VESSEL ARRIVED & NOR TENDERED") {
                            row.to = ""; // 强制变成单点
                            row.rate = "";
                            cleanData.push(row);
                        } else if (row.remarks === "COMMENCED DISCHG") {
                            // AI 抄下来的是时间段，JS 负责把它拆成“单点动作”和“开始干活时间”
                            cleanData.push({ date: row.date, from: row.from, to: "", rate: "", used: "", remarks: "COMMENCED DISCHG" });
                            if (row.to && row.to !== row.from) {
                                cleanData.push({ date: row.date, from: row.from, to: row.to, rate: "100%", used: "", remarks: "FULL TIME TO COUNT" });
                            }
                        } else if (row.remarks === "COMPLETED DISCHG") {
                            // 拆分出完货前的干活时间，然后把完货作为单点压轴
                            if (row.from && row.to !== row.from) {
                                cleanData.push({ date: row.date, from: row.from, to: row.to, rate: "100%", used: "", remarks: "FULL TIME TO COUNT" });
                            }
                            cleanData.push({ date: row.date, from: row.to || row.from, to: "", rate: "", used: "", remarks: "COMPLETED DISCHG" });
                            
                            // 🚨🚨 斩首行动！遇到完货动作直接跳出循环，彻底抛弃后面的所有废数据！🚨🚨
                            break; 
                        } else {
                            cleanData.push(row);
                        }
                    }
        
                    // ================= 第一步：智能缝合相邻同类项 =================
                    let mergedData = [];
                    for (let i = 0; i < cleanData.length; i++) {
                        let row = Object.assign({}, cleanData[i]); 
                        if (mergedData.length > 0) {
                            let last = mergedData[mergedData.length - 1];
                            const isSinglePoint = ["VESSEL ARRIVED & NOR TENDERED", "COMMENCED DISCHG", "COMPLETED DISCHG"].includes(row.remarks);
                            
                            // 【缝合魔法】如果连续两行的 remarks 一样，就把上一行的结尾拉长！
                            if (!isSinglePoint && last.remarks === row.remarks) {
                                last.to = row.to; 
                                continue;
                            }
                        }
                        mergedData.push(row);
                    }
                    data = mergedData; 
        
                    // ================= 第二步：处理 12 小时 TT =================
                    if (!document.getElementById('ruleTT').checked) return data;
        
                    const norRow = data.find(row => row.remarks === "VESSEL ARRIVED & NOR TENDERED");
                    if (!norRow) return data; 
                    const norTime = parseDateTime(norRow.from || norRow.to);
                    if (!norTime) return data;
        
                    let ttEndTime = new Date(norTime.getTime() + 12 * 60 * 60 * 1000); 
        
                    // 寻找打断 TT 的事件并重置结束时间
                    const shiftingRow = data.find(row => row.remarks === "SHIFTING N/C");
                    if (shiftingRow && shiftingRow.from) {
                        const shiftStart = parseDateTime(shiftingRow.from);
                        if (shiftStart > norTime && shiftStart < ttEndTime) ttEndTime = shiftStart;
                    }
        
                    const dischRow = data.find(row => row.remarks === "COMMENCED DISCHG");
                    if (dischRow && dischRow.from) {
                        const dischStart = parseDateTime(dischRow.from || dischRow.to);
                        if (dischStart > norTime && dischStart < ttEndTime) ttEndTime = dischStart;
                    }
        
                    // ================= 第三步：植入 TT 并裁剪被占用时间 =================
                    let finalData = [];
                    let ttInserted = false;
        
                    for (let i = 0; i < data.length; i++) {
                        let row = data[i];
        
                        if (!row.to || row.to === "" || ["VESSEL ARRIVED & NOR TENDERED", "COMMENCED DISCHG", "COMPLETED DISCHG"].includes(row.remarks)) {
                            finalData.push(row);
                            if (row.remarks === "VESSEL ARRIVED & NOR TENDERED") {
                                finalData.push({
                                    date: row.date,
                                    from: row.from || row.to,
                                    to: formatDateTime(ttEndTime),
                                    rate: "0%",
                                    used: "",
                                    remarks: "12 HOURS TT"
                                });
                                ttInserted = true;
                            }
                            continue;
                        }
        
                        if (ttInserted) {
                            let rowStart = parseDateTime(row.from);
                            let rowEnd = parseDateTime(row.to);
        
                            if (rowStart < ttEndTime && rowEnd > ttEndTime) {
                                row.from = formatDateTime(ttEndTime);
                                finalData.push(row);
                            } else if (rowEnd <= ttEndTime) {
                                continue; 
                            } else {
                                finalData.push(row);
                            }
                        } else {
                            finalData.push(row);
                        }
                    }
        
                    return finalData;
                }        
                

       async function processImage() {
                   const fileInput = document.getElementById('imageInput');
                   if (!fileInput.files[0]) return alert("请先上传一张 SOF 截图");
       
                   document.getElementById('loading').style.display = 'inline';
                   document.getElementById('submitBtn').disabled = true;
                   document.getElementById('resultTable').style.display = 'none';
                   document.getElementById('copyBtn').style.display = 'none';
       
                   try {
                       // 1. 将图片转为 Base64
                       const file = fileInput.files[0];
                       const base64String = await new Promise((resolve, reject) => {
                           const reader = new FileReader();
                           reader.onloadend = () => resolve(reader.result);
                           reader.onerror = reject;
                           reader.readAsDataURL(file);
                       });
       
                       // 2. 组装终极 Prompt (这里是你之前确认过的卸港规则)
                       // 要求千问包在一层 { "data": [...] } 里，方便 JSON 解析
                       const systemPrompt = `你是一个无情的 OCR 数据提取机器。当前任务：将 SOF 图片中的表格逐行转换为 JSON 数组。
                       
                       🚨【最高优先级要求：绝对禁止合并或遗漏任何行！】🚨
                       原图表格中有几行数据，你的 JSON 数组里就必须有多少个对象！
                       严格按照从上到下的顺序，逐行照抄 FROM 和 TO 的时间。绝不允许把多行合并成一行！
                       
                       【打标签规则（按优先级顺序，满足第一条就不看后面的）：】
                       请仔细阅读该行 DESCRIPTION 里的文字，根据以下优先级替换标签：
                       
                       1. 包含 "N.O.R" 或 "NOR"：必定是递交 NOR（注意：即使里面有 PILOT 等词，只要有 NOR 也是这条规则优先！）。rate填""，remarks强制填"VESSEL ARRIVED & NOR TENDERED"。
                       2. 包含 "DISCHARGING" 且包含 "COMPLETED"：rate填"100%"，remarks强制填"COMPLETED DISCHG"。【注意：提取完这一行后，立即停止整个任务，绝不提取后续的任何行！】
                       3. 包含 "COMMENCED" 且包含 "DISCHARGING"：rate填"100%"，remarks强制填"COMMENCED DISCHG"。
                       4. 包含 "INITIAL DRAFT"：rate填"0%"，remarks强制填"DRAFT SURVEY N/C"。
                       5. 包含 "PILOT", "PROCEED", "FIRST LINE", "ALL FAST", "MAKE FAST" 任意一个：rate填"0%"，remarks强制填"SHIFTING N/C"。
                       6. 如果以上 1 到 5 的词汇都不包含（例如图上的等待靠泊 WAITED FOR BERTHING, 检疫 QUARANTINE, 办手续 FORMALITIES, 准备卸货 PREPARE 等等）：照抄起止时间，rate填"100%"，remarks统一强制填"FULL TIME TO COUNT"。
                       
                       【输出规范】
                       必须且只能输出包含 data 键的 JSON 对象：
                       {
                         "data": [
                           {
                             "date": "月/日 (如 4/14)",
                             "from": "M/D HH:MM (照抄原图，如果没有就留空)",
                             "to": "M/D HH:MM (照抄原图，如果没有就留空)",
                             "rate": "按规则输出",
                             "used": "",
                             "remarks": "按规则输出的标准描述"
                           }
                         ]
                       }`;
					   
       
                       // 3. 调用我们自己写的 Vercel 后端接口
                       const response = await fetch('/api/get-laytime', {
                           method: 'POST',
                           headers: { 'Content-Type': 'application/json' },
                           body: JSON.stringify({
                               imageBase64: base64String,
                               systemPrompt: systemPrompt
                           })
                       });
       
                       const result = await response.json();
       
                       if (!response.ok) {
                           throw new Error(result.error || '请求失败');
                       }
       
                       if (!result.data || result.data.length === 0) {
                           throw new Error("AI 没有提取到有效数据，请检查图片是否清晰");
                       }
       
                       // 4. 执行 JS 硬逻辑计算 12 HOURS TT
                       laytimeData = injectTurnTime(result.data);
                       
                       // 5. 渲染表格
                       renderTable(laytimeData);
                       
                       document.getElementById('resultTable').style.display = 'table';
                       document.getElementById('copyBtn').style.display = 'block';
       
                   } catch (error) {
                       alert("提取失败：" + error.message);
                       console.error(error);
                   } finally {
                       document.getElementById('loading').style.display = 'none';
                       document.getElementById('submitBtn').disabled = false;
                   }
               }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 
            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="display:none;"><input type="text" id="date-${index}" value="${row.date || ''}"></td>
                    <td><input type="text" id="from-${index}" value="${row.from || ''}"></td>
                    <td><input type="text" id="to-${index}" value="${row.to || ''}"></td>
                    <td><input type="text" id="rate-${index}" value="${row.rate || ''}"></td>
                    <td><input type="text" id="used-${index}" value="${row.used || ''}"></td>
                    <td><input type="text" id="desc-${index}" value="${row.remarks || ''}"></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function copyToExcel() {
            let clipboardText = "";
            
            laytimeData.forEach((_, index) => {
                // 读取当前输入框里（可能被你手动修改过）的最新值
                const from = document.getElementById(`from-${index}`).value;
                const to = document.getElementById(`to-${index}`).value;
                const rate = document.getElementById(`rate-${index}`).value;
                const used = document.getElementById(`used-${index}`).value;
                const desc = document.getElementById(`desc-${index}`).value;
                
                // 完美匹配 Excel 五列: FROM | TO | RATE | USED | REMARKS
                clipboardText += `${from}\t${to}\t${rate}\t${used}\t${desc}\n`;
            });

            navigator.clipboard.writeText(clipboardText).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "✅ 复制成功！快去 Excel 选定第一个单元格 (Ctrl+V) 吧";
                btn.style.background = "#218838";
                setTimeout(() => {
                    btn.innerText = "📋 确认无误，一键完美复制到 Excel";
                    btn.style.background = "#28a745";
                }, 3000);
            }).catch(err => {
                alert("复制失败: " + err);
            });
        }
    </script>
</body>
</html>
