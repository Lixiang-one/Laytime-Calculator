<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laytime 智能结算系统 - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; 
            --primary-hover: #4338ca;
            --bg-color: #f8fafc; 
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --success-hover: #059669;
            --radius-lg: 16px;
            --radius-md: 10px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            max-width: 1000px; 
            margin: 40px auto; 
            padding: 0 20px; 
            line-height: 1.6;
        }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 32px; padding-bottom: 20px; 
            border-bottom: 1px solid var(--border-color);
        }
        .header h1 { 
            margin: 0; font-size: 28px; font-weight: 700; color: var(--text-main); 
            letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px;
        }
        .header h1 span { color: var(--primary); }

        .card { 
            background: var(--card-bg); border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-md); padding: 32px; margin-bottom: 24px; 
            border: 1px solid rgba(255,255,255,0.5);
        }
        .card-title { 
            font-size: 16px; font-weight: 600; margin-top: 0; margin-bottom: 20px; 
            color: var(--text-main); display: flex; align-items: center; gap: 8px;
        }

        button { 
            font-family: inherit; font-size: 15px; font-weight: 600; 
            padding: 12px 24px; border-radius: var(--radius-md); border: none; 
            cursor: pointer; transition: var(--transition); 
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3); }
        .btn-success { background: var(--success); color: white; width: 100%; font-size: 16px; padding: 16px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-success:hover { background: var(--success-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px 16px; }
        .btn-outline:hover { background: var(--bg-color); color: var(--text-main); }

        .segment-control {
            display: inline-flex; background: #f1f5f9; padding: 4px; 
            border-radius: 12px; margin-bottom: 24px;
        }
        .segment-control input[type="radio"] { display: none; }
        .segment-control label {
            padding: 10px 24px; font-weight: 500; font-size: 15px; color: var(--text-muted);
            border-radius: 8px; cursor: pointer; transition: var(--transition);
        }
        .segment-control input[type="radio"]:checked + label {
            background: white; color: var(--primary); box-shadow: var(--shadow-sm); font-weight: 600;
        }

        .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; background: #f8fafc; padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .rule-switch { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: white; border-radius: 8px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);}
        .rule-text { font-size: 14px; font-weight: 500; color: var(--text-main); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        .json-input-area { 
            width: 100%; height: 180px; resize: vertical; padding: 16px; 
            border: 2px solid var(--border-color); border-radius: var(--radius-md); 
            font-family: 'JetBrains Mono', monospace, Consolas; font-size: 13px; 
            line-height: 1.6; color: #334155; background: #f8fafc; transition: var(--transition); box-sizing: border-box;
        }
        .json-input-area:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .table-container { overflow-x: auto; margin-top: 10px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
        th { background: #f8fafc; padding: 14px 16px; text-align: left; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border-color); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        tr:hover td { background: #f8fafc; }
        tr:last-child td { border-bottom: none; }
        
        input[type="text"].cell-input { 
            width: 100%; box-sizing: border-box; border: 1px solid transparent; 
            padding: 8px 10px; background: transparent; font-size: 14px; 
            color: var(--text-main); font-family: inherit; border-radius: 6px; transition: var(--transition);
        }
        input[type="text"].cell-input:hover { border-color: #e2e8f0; }
        input[type="text"].cell-input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .settings-panel { 
            display: none; background: #fff; padding: 24px; border-radius: var(--radius-lg); 
            border: 1px solid var(--border-color); box-shadow: var(--shadow-md); margin-bottom: 24px;
        }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .kw-group { display: flex; flex-direction: column; gap: 8px; }
        .kw-group label { font-weight: 600; font-size: 13px; color: var(--text-muted); }
        .kw-group input { 
            padding: 10px 12px; border: 1px solid var(--border-color); 
            border-radius: 8px; font-size: 14px; transition: var(--transition);
        }
        .kw-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        
        .badge { background: #e0e7ff; color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-left: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚢 Laytime <span>Pro</span></h1>
        <button class="btn-outline" onclick="toggleSettings()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            规则配置中心
        </button>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <h3 id="settingsTitle" style="margin-top: 0; display: flex; align-items: center;">
            自定义识别词库 <span class="badge" id="modeBadge">卸港模式</span>
        </h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">多个识别关键词请使用英文逗号 <code>,</code> 分隔。注意：无需填写 LOAD/DISCHARG 等动作词，系统会自动在底层严格校验。</p>
        <div class="settings-grid">
            <div class="kw-group"><label>NOR 递交 (NOR Tendered)</label><input type="text" id="kwNor"></div>
            <div class="kw-group"><label>移泊动作 (Shifting)</label><input type="text" id="kwShifting"></div>
            <div class="kw-group"><label>水尺作业 (Draft Survey)</label><input type="text" id="kwDraft"></div>
            <div class="kw-group"><label>坏天气 (Bad Weather)</label><input type="text" id="kwWeather"></div>
            <div class="kw-group"><label>开始作业 (Commenced)</label><input type="text" id="kwCommenced"></div>
            <div class="kw-group"><label>完成作业 (Completed)</label><input type="text" id="kwCompleted"></div>
            <div class="kw-group"><label>水分测试 (Can Test) - 装港特有</label><input type="text" id="kwCanTest" placeholder="如: CAN TEST, CAN-TEST"></div>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
            <button class="btn-primary" onclick="saveKeywords()">💾 保存当前模式库</button>
            <span id="saveTip" style="color: var(--success); font-weight: 500; opacity: 0; transition: opacity 0.3s;">保存成功！</span>
        </div>
    </div>

    <div class="card">
        <div class="segment-control">
            <input type="radio" id="portLoading" name="portType" value="loading" onchange="handlePortChange()">
            <label for="portLoading">🔵 装货港 (Loading)</label>
            
            <input type="radio" id="portDischarging" name="portType" value="discharging" checked onchange="handlePortChange()">
            <label for="portDischarging">🔴 卸货港 (Discharging)</label>
        </div>

        <h4 class="card-title">⚙️ 智能过滤规则计算器</h4>
        <div class="rules-grid" id="rulesBox">
            </div>
    </div>

    <div class="card">
        <h4 class="card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            原始 JSON 数据接入
        </h4>
        <textarea id="jsonInput" class="json-input-area" placeholder='请在此粘贴由 AI 提取的原生 JSON 数据数组...
[
  { 
    "date": "9/29", 
    "from": "9/29 16:00", 
    "to": "9/29 16:50", 
    "rawDescription": "VSL ARRIVED AT ANCHORAGE..." 
  }
]'></textarea>
        <div style="margin-top: 24px; text-align: right;">
            <button class="btn-primary" onclick="processData()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                运行智能结算引擎
            </button>
        </div>
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <h4 class="card-title" style="color: var(--success);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            结算报表生成完毕
        </h4>
        <div class="table-container">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th style="width: 18%;">From (M/D HH:MM)</th>
                        <th style="width: 18%;">To (M/D HH:MM)</th>
                        <th style="width: 12%;">Rate</th>
                        <th style="width: 12%;">Used</th>
                        <th style="width: 40%;">Remarks / Description</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button id="copyBtn" class="btn-success" onclick="copyToExcel()" style="margin-top: 24px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            一键完美复制到 Excel
        </button>
    </div>

    <script>
        // ================= 默认双模关键词配置 (v12) =================
        const defaultKeywords = {
            loading: {
                nor: "N.O.R, NOR",
                shifting: "PILOT, PROCEED, FAST, LINE, ANCHORAGE",
                draft: "INITIAL DRAFT, DRAFT SURVEY, INTERMEDIATE DRAFT", 
                weather: "RAIN, BAD WEATHER, SWELL",
                commenced: "COMMENCE, START", 
                completed: "COMPLETED, FINISH", 
                cantest: "CAN TEST, CAN-TEST, CAN TESTING" 
            },
            discharging: {
                nor: "N.O.R, NOR",
                shifting: "PILOT, PROCEED, FAST, LINE, ANCHORAGE",
                draft: "INITIAL DRAFT, DRAFT SURVEY, INTERMEDIATE DRAFT", 
                weather: "RAIN, BAD WEATHER, SWELL",
                commenced: "COMMENCE, START", 
                completed: "COMPLETED, FINISH",
                cantest: "CAN TEST, CAN-TEST" 
            }
        };

        window.onload = function() { 
            handlePortChange(); 
        };

        function getPortType() {
            const el = document.querySelector('input[name="portType"]:checked');
            return el ? el.value : 'discharging';
        }

        function handlePortChange() {
            updateRulesUI();
            loadKeywords();
        }

        // ================= UI 交互逻辑 =================
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            if(panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                panel.style.display = 'block';
                panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function getToggleHtml(id, text, checked = true) {
            return `
            <div class="rule-switch">
                <span class="rule-text">${text}</span>
                <label class="switch">
                    <input type="checkbox" id="${id}" ${checked ? 'checked' : ''}>
                    <span class="slider"></span>
                </label>
            </div>`;
        }

        function updateRulesUI() {
            try {
                const portType = getPortType();
                const container = document.getElementById('rulesBox');
                if (!container) return;
                
                let html = '';
                
                if (portType === 'loading') {
                    html += getToggleHtml('ruleTT', '自动执行 12 HRS TT (含早装早算)');
                    html += getToggleHtml('ruleShifting', '移泊时间 (Shifting) 计为 0%');
                    html += getToggleHtml('ruleDraft', '初次水尺 (Initial Draft) 计为 0%'); 
                    html += getToggleHtml('ruleInterDraft', '中间水尺 (Intermediate Draft) 计为 0%');
                    html += getToggleHtml('ruleBadWeather', '坏天气 (Bad Weather/Rain) 停工计为 0%'); 
                    
                    html += `
                    <div class="rule-switch" style="flex-direction: column; align-items: flex-start; gap: 10px; grid-column: span 2; background: #eff6ff; border-color: #bfdbfe;">
                        <span class="rule-text" style="color: var(--primary); font-weight: 600;">🧪 CAN TEST (水分测试) 扣减规则：</span>
                        <div style="display: flex; gap: 20px; width: 100%;">
                            <label style="font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                                <input type="radio" name="canTestRule" value="zero" checked> 只要测试一律计为 0% (全扣)
                            </label>
                            <label style="font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                                <input type="radio" name="canTestRule" value="fifty"> 边装边测计 50%，纯测计 0%
                            </label>
                        </div>
                    </div>`;
                } else {
                    html += getToggleHtml('ruleTT', '自动执行 12 HRS TT (含早卸早算)');
                    html += getToggleHtml('ruleShifting', '移泊时间 (Shifting) 计为 0%');
                    html += getToggleHtml('ruleDraft', '初次水尺 (Initial Draft) 计为 0%');
                    html += getToggleHtml('ruleBadWeather', '坏天气 (Bad Weather/Rain) 停工计为 0%');
                }
                container.innerHTML = html;
            } catch (e) {
                console.error("updateRulesUI 崩溃:", e);
            }
        }

        function loadKeywords() {
            try {
                const portType = getPortType();
                let savedData = defaultKeywords;
                
                try {
                    const localStr = localStorage.getItem('laytimeKeywords_v12');
                    if (localStr) {
                        savedData = JSON.parse(localStr);
                    }
                } catch(e) {
                    localStorage.removeItem('laytimeKeywords_v12');
                }

                const currentKws = savedData[portType] || defaultKeywords[portType];

                document.getElementById('kwNor').value = currentKws.nor || defaultKeywords[portType].nor;
                document.getElementById('kwShifting').value = currentKws.shifting || defaultKeywords[portType].shifting;
                document.getElementById('kwDraft').value = currentKws.draft || defaultKeywords[portType].draft;
                document.getElementById('kwWeather').value = currentKws.weather || defaultKeywords[portType].weather;
                document.getElementById('kwCommenced').value = currentKws.commenced || defaultKeywords[portType].commenced;
                document.getElementById('kwCompleted').value = currentKws.completed || defaultKeywords[portType].completed;
                document.getElementById('kwCanTest').value = currentKws.cantest || defaultKeywords[portType].cantest;

                const badge = document.getElementById('modeBadge');
                if (badge) {
                    if (portType === 'loading') {
                        badge.innerText = '🔵 装港专属';
                        badge.style.color = '#0284c7'; badge.style.backgroundColor = '#e0f2fe';
                    } else {
                        badge.innerText = '🔴 卸港专属';
                        badge.style.color = '#e11d48'; badge.style.backgroundColor = '#ffe4e6';
                    }
                }
            } catch (e) {
                console.error("loadKeywords 崩溃:", e);
            }
        }

        function saveKeywords() {
            try {
                const portType = getPortType();
                let savedData = defaultKeywords;
                try {
                    const localStr = localStorage.getItem('laytimeKeywords_v12');
                    if (localStr) savedData = JSON.parse(localStr);
                } catch(e){}

                savedData[portType] = {
                    nor: document.getElementById('kwNor').value,
                    shifting: document.getElementById('kwShifting').value,
                    draft: document.getElementById('kwDraft').value,
                    weather: document.getElementById('kwWeather').value,
                    commenced: document.getElementById('kwCommenced').value,
                    completed: document.getElementById('kwCompleted').value,
                    cantest: document.getElementById('kwCanTest').value
                };

                localStorage.setItem('laytimeKeywords_v12', JSON.stringify(savedData));
                const tip = document.getElementById('saveTip');
                if (tip) {
                    tip.style.opacity = '1';
                    setTimeout(() => tip.style.opacity = '0', 2000);
                }
            } catch (e) {
                alert("保存失败，请检查浏览器是否允许写入本地缓存。");
            }
        }

        function matchKeyword(desc, commaSeparatedKeywords) {
            if (!desc || !commaSeparatedKeywords) return false;
            const keywords = commaSeparatedKeywords.split(',').map(k => k.trim().toUpperCase());
            return keywords.some(kw => kw && desc.includes(kw));
        }

        // ================= 核心时间运算引擎 =================
        function parseDateTime(dateTimeStr) {
            if (!dateTimeStr) return null;
            try {
                let parts = dateTimeStr.trim().split(' ');
                if (parts.length !== 2) return null;
                let [month, day] = parts[0].split('/');
                let [hour, minute] = parts[1].split(':');
                return new Date(2024, parseInt(month) - 1, parseInt(day), parseInt(hour), parseInt(minute));
            } catch (e) { return null; }
        }

        function formatDateTime(dateObj) {
            const m = dateObj.getMonth() + 1;
            const d = dateObj.getDate();
            const hh = String(dateObj.getHours()).padStart(2, '0');
            const mm = String(dateObj.getMinutes()).padStart(2, '0');
            return `${m}/${d} ${hh}:${mm}`;
        }

        function processData() {
            const jsonStr = document.getElementById('jsonInput').value.trim();
            if (!jsonStr) return alert("请先在文本框中粘贴原始 JSON 数据！");
            
            try {
                const rawData = JSON.parse(jsonStr);
                const dataArray = rawData.data ? rawData.data : rawData; 
                if (!Array.isArray(dataArray)) throw new Error("输入格式错误，需要为 JSON 数组。");

                const portType = getPortType();
                
                let allKws = defaultKeywords;
                try {
                    const localStr = localStorage.getItem('laytimeKeywords_v12');
                    if (localStr) allKws = JSON.parse(localStr);
                } catch(e){}
                const kws = allKws[portType] || defaultKeywords[portType]; 

                const ruleShifting = document.getElementById('ruleShifting') ? document.getElementById('ruleShifting').checked : false;
                const ruleDraft = document.getElementById('ruleDraft') ? document.getElementById('ruleDraft').checked : false;
                const ruleInterDraft = document.getElementById('ruleInterDraft') ? document.getElementById('ruleInterDraft').checked : false;
                const ruleWeather = document.getElementById('ruleBadWeather') ? document.getElementById('ruleBadWeather').checked : false;
                const ruleTT = document.getElementById('ruleTT') ? document.getElementById('ruleTT').checked : false;
                
                const canTestRule = document.querySelector('input[name="canTestRule"]:checked')?.value || 'zero';

                const actionSuffix = portType === 'loading' ? 'LOADING' : 'DISCHG';
                const actionCommenced = `COMMENCED ${actionSuffix}`;
                const actionCompleted = `COMPLETED ${actionSuffix}`;
                const actionTarget = portType === 'loading' ? 'LOAD' : 'DISCHARG';

                let taggedData = [];

                // --- 1. 强力截断：只保留最后一次 NOR 之后的数据 ---
                let lastNorIndexRaw = -1;
                for (let i = 0; i < dataArray.length; i++) {
                    let descRaw = (dataArray[i].rawDescription || "").toUpperCase();
                    if (matchKeyword(descRaw, kws.nor)) {
                        lastNorIndexRaw = i;
                    }
                }
                let validDataArray = lastNorIndexRaw >= 0 ? dataArray.slice(lastNorIndexRaw) : dataArray;

                // --- 1.5 🚀 终极防误斩：预判全船【最后一次】完工的行号 ---
                let finalCompletionIndex = -1;
                for (let i = 0; i < validDataArray.length; i++) {
                    let descRaw = (validDataArray[i].rawDescription || "").toUpperCase();
                    if (matchKeyword(descRaw, kws.completed) && descRaw.includes(actionTarget) && !descRaw.includes("WAIT")) {
                        finalCompletionIndex = i; // 循环结束时，此变量必然记录的是最后一次出现的下标
                    }
                }

                // --- 2. 清洗与特征提取 ---
                for (let i = 0; i < validDataArray.length; i++) {
                    let row = validDataArray[i];
                    let desc = (row.rawDescription || "").toUpperCase();
                    
                    let fTime = row.from ? row.from.trim() : "";
                    let tTime = row.to ? row.to.trim() : "";
                    if (!fTime && tTime) fTime = tTime;
                    if (!tTime && fTime) tTime = fTime;
                    
                    let newRow = { date: row.date, from: fTime, to: tTime, rate: "100%", used: "", remarks: "FULL TIME TO COUNT" };

                    // NOR 判断
                    if (matchKeyword(desc, kws.nor)) {
                        newRow.from = fTime; 
                        newRow.to = ""; 
                        newRow.rate = ""; 
                        newRow.remarks = "VESSEL ARRIVED & NOR TENDERED";
                    } 
                    // CAN TEST 判断 (装港特有)
                    else if (portType === 'loading' && matchKeyword(desc, kws.cantest)) {
                        if (canTestRule === 'fifty' && (desc.includes("LOAD") || desc.includes("CONTINUE") || desc.includes("PROGRESS"))) {
                            newRow.rate = "50%";
                            newRow.remarks = "CAN TEST & LOADING (50%)";
                        } else {
                            newRow.rate = "0%";
                            newRow.remarks = "CAN TEST N/C";
                        }
                    }
                    // 水尺判断 
                    else if (matchKeyword(desc, kws.draft)) {
                        if (desc.includes("INTERMEDIATE") && portType === 'loading' && !ruleInterDraft) {
                            newRow.rate = "100%"; newRow.remarks = "INTERMEDIATE DRAFT";
                        } else {
                            newRow.rate = ruleDraft ? "0%" : "100%"; 
                            newRow.remarks = "DRAFT SURVEY N/C";
                        }
                    }
                    // 坏天气判断
                    else if (matchKeyword(desc, kws.weather)) {
                        newRow.rate = ruleWeather ? "0%" : "100%"; 
                        newRow.remarks = "BAD WEATHER N/C";
                    }
                    // 移泊判断
                    else if (matchKeyword(desc, kws.shifting)) {
                        newRow.rate = ruleShifting ? "0%" : "100%"; 
                        newRow.remarks = "SHIFTING N/C";
                    }
                    // 🚢 开始装/卸 (必须包含动作词且不含WAIT)
                    else if (matchKeyword(desc, kws.commenced) && desc.includes(actionTarget) && !desc.includes("WAIT")) {
                        taggedData.push({ date: row.date, from: fTime, to: "", rate: "", used: "", remarks: actionCommenced });
                        if (row.from && row.to && row.from !== row.to) {
                            newRow.remarks = "FULL TIME TO COUNT";
                            newRow.from = row.from;
                            newRow.to = row.to;
                        } else {
                            continue; 
                        }
                    }
                    
                    // 🚢 完货斩首逻辑：仅在【最后一次完工】时彻底截断
                    let isCompleted = matchKeyword(desc, kws.completed) && desc.includes(actionTarget) && !desc.includes("WAIT");
                    if (isCompleted) {
                        if (i === finalCompletionIndex) {
                            // 这是真正的全船完工！开始斩首！
                            if (row.from && row.to && row.from !== row.to) {
                                taggedData.push({ date: row.date, from: row.from, to: row.to, rate: "100%", used: "", remarks: "FULL TIME TO COUNT" });
                            }
                            const endTime = tTime || fTime;
                            taggedData.push({ date: row.date, from: endTime, to: "", rate: "", used: "", remarks: actionCompleted });
                            break; // 斩首！
                        } 
                        // 如果不是最后一次完货，它会自动落入最后的 taggedData.push(newRow) 环节，当做普通工作时间
                    }
                    
                    taggedData.push(newRow);
                }

                // --- 3. 碎片缝合 ---
                let mergedData = [];
                for (let i = 0; i < taggedData.length; i++) {
                    let row = Object.assign({}, taggedData[i]); 
                    if (mergedData.length > 0) {
                        let last = mergedData[mergedData.length - 1];
                        const isSinglePoint = ["VESSEL ARRIVED & NOR TENDERED", actionCommenced, actionCompleted].includes(row.remarks);
                        if (!isSinglePoint && last.remarks === row.remarks) {
                            last.to = row.to; continue;
                        }
                    }
                    mergedData.push(row);
                }
                let data = mergedData; 

                // --- 4. 终极 TT 早装早算逻辑植入 ---
                if (!ruleTT || data.length === 0) { renderTable(data); return; }

                const norRow = data[0];
                if (norRow.remarks !== "VESSEL ARRIVED & NOR TENDERED") { renderTable(data); return; }
                const norTime = parseDateTime(norRow.from);
                if (!norTime) { renderTable(data); return; }

                let ttEndTime = new Date(norTime.getTime() + 12 * 60 * 60 * 1000); 

                // 只通过【开工】来拦截 TT，废除移泊干扰
                const actionRow = data.find((row, idx) => idx > 0 && row.remarks === actionCommenced);
                if (actionRow && actionRow.from) {
                    const actionStart = parseDateTime(actionRow.from);
                    if (actionStart > norTime && actionStart < ttEndTime) {
                        ttEndTime = actionStart;
                    }
                }

                let finalData = [];
                let ttInserted = false;

                for (let i = 0; i < data.length; i++) {
                    let row = data[i];
                    
                    if (!row.to || row.to === "" || ["VESSEL ARRIVED & NOR TENDERED", actionCommenced, actionCompleted].includes(row.remarks)) {
                        finalData.push(row);
                        if (row.remarks === "VESSEL ARRIVED & NOR TENDERED" && i === 0) {
                            finalData.push({ date: row.date, from: row.from || row.to, to: formatDateTime(ttEndTime), rate: "0%", used: "", remarks: "12 HOURS TT" });
                            ttInserted = true;
                        }
                        continue;
                    }
                    
                    if (ttInserted) {
                        let rowStart = parseDateTime(row.from);
                        let rowEnd = parseDateTime(row.to);
                        if (!rowStart || !rowEnd) { finalData.push(row); continue; }

                        if (rowStart < ttEndTime && rowEnd > ttEndTime) {
                            row.from = formatDateTime(ttEndTime); 
                            finalData.push(row);
                        } else if (rowEnd <= ttEndTime) {
                            continue; // 完全在 12 小时 TT 内，直接隐藏
                        } else { 
                            finalData.push(row); 
                        }
                    } else { 
                        finalData.push(row); 
                    }
                }

                renderTable(finalData);
                document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
                
            } catch (e) {
                alert("解析出错，请确认粘贴的 JSON 格式是否正确！\n\n技术详情: " + e.message);
                console.error(e);
            }
        }

        // ================= 表格渲染与剪贴板 =================
        let globalLaytimeData = [];
        function renderTable(data) {
            globalLaytimeData = data;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 
            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="text" class="cell-input" id="from-${index}" value="${row.from || ''}"></td>
                    <td><input type="text" class="cell-input" id="to-${index}" value="${row.to || ''}"></td>
                    <td><input type="text" class="cell-input" id="rate-${index}" value="${row.rate || ''}" style="font-family: monospace; font-weight: 600; color: ${row.rate === '0%' ? '#ef4444' : (row.rate === '50%' ? '#eab308' : '#10b981')};"></td>
                    <td><input type="text" class="cell-input" id="used-${index}" value="${row.used || ''}"></td>
                    <td><input type="text" class="cell-input" id="desc-${index}" value="${row.remarks || ''}" style="font-weight: 500;"></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('resultCard').style.display = 'block';
        }

        function copyToExcel() {
            let clipboardText = "";
            globalLaytimeData.forEach((_, index) => {
                const from = document.getElementById(`from-${index}`).value;
                const to = document.getElementById(`to-${index}`).value;
                const rate = document.getElementById(`rate-${index}`).value;
                const used = document.getElementById(`used-${index}`).value;
                const desc = document.getElementById(`desc-${index}`).value;
                clipboardText += `${from}\t${to}\t${rate}\t${used}\t${desc}\n`;
            });

            navigator.clipboard.writeText(clipboardText).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;"><polyline points="20 6 9 17 4 12"></polyline></svg> 复制成功！快去 Excel 粘贴吧 (Ctrl+V)`;
                btn.style.background = "var(--success-hover)";
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.style.background = "var(--success)";
                }, 3000);
            }).catch(err => alert("复制失败: " + err));
        }
    </script>
</body>
